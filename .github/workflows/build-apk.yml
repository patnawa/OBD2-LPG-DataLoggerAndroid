name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Strip local JDK path for Linux runner
      # gradle.properties hardcodes a Windows JDK path (org.gradle.java.home)
      # for local dev. That path doesn't exist on the Linux runner, so remove
      # the line and let setup-java's JAVA_HOME take over.
      run: sed -i '/org\.gradle\.java\.home=/d' gradle.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode signing keystore
      # Decode the base64-encoded keystore from GitHub secrets into the
      # runner's temp dir. The path is then passed to Gradle via the
      # android.injectedSign* properties so AGP signs the release build.
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        mkdir -p "$RUNNER_TEMP/keystore"
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.jks"
        echo "Keystore decoded: $(stat -c '%s bytes' "$RUNNER_TEMP/keystore/release.jks")"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK (signed)
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injectedSignStorePath="$RUNNER_TEMP/keystore/release.jks" \
          -Pandroid.injectedSignStorePassword="$ANDROID_KEYSTORE_PASSWORD" \
          -Pandroid.injectedSignKeyAlias="$ANDROID_KEY_ALIAS" \
          -Pandroid.injectedSignKeyPassword="$ANDROID_KEY_PASSWORD"

    - name: Clean up keystore
      if: always()
      run: rm -f "$RUNNER_TEMP/keystore/release.jks"

    - name: Verify APK signature
      # Confirm the produced APK is signed with v2/v3 scheme so installs and
      # upgrades on Android 7+ work without "INSTALL_PARSE_FAILED_NO_CERTIFICATES".
      run: |
        APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
        echo "Verifying: $APK"
        "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK" || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: OBD2LPGLogger-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload Release APK (signed)
      uses: actions/upload-artifact@v4
      with:
        name: OBD2LPGLogger-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest
      continue-on-error: true

  # Auto-create GitHub Release when a tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Strip local JDK path for Linux runner
      run: sed -i '/org\.gradle\.java\.home=/d' gradle.properties

    - name: Decode signing keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        mkdir -p "$RUNNER_TEMP/keystore"
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.jks"
        echo "Keystore decoded: $(stat -c '%s bytes' "$RUNNER_TEMP/keystore/release.jks")"

    - name: Build signed Release APK
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injectedSignStorePath="$RUNNER_TEMP/keystore/release.jks" \
          -Pandroid.injectedSignStorePassword="$ANDROID_KEYSTORE_PASSWORD" \
          -Pandroid.injectedSignKeyAlias="$ANDROID_KEY_ALIAS" \
          -Pandroid.injectedSignKeyPassword="$ANDROID_KEY_PASSWORD"

    - name: Clean up keystore
      if: always()
      run: rm -f "$RUNNER_TEMP/keystore/release.jks"

    - name: Verify APK signature
      run: |
        APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
        echo "Verifying: $APK"
        "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK" || true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
